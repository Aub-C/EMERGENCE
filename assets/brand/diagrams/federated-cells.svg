  <g><rect x="530" y="265" width="340" height="170" rx="24" fill="#111720" stroke="#16D9E3" stroke-width="2"/><text x="700" y="317" fill="#F4F7FA" font-size="24" font-weight="900">ORIENTATION PACKET</text><text x="700" y="350" fill="#98A2B3" font-size="15">target cell + neighbors + contracts</text><text x="700" y="381" fill="#7DFFB3" font-size="14">read only what matters</text><text x="700" y="407" fill="#16D9E3" font-size="13">npm run orient</text></g>
